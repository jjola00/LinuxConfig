# Window configuration
[window]
dynamic_padding = true
opacity = 0.9

[window.padding]
x = 10
y = 10

# Font configuration
[font]
size = 10.0

[font.normal]
family = "IosevkaTerm Nerd Font Mono"
style = "Regular"

[font.bold]
family = "IosevkaTerm Nerd Font Mono"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font Mono"
style = "Italic"

[font.offset]
x = 0
y = 0

# Cursor configuration
[cursor]
vi_mode_style = "Block"

[cursor.style]
blinking = "On"
shape = "Block"

# Colors configuration
[colors.primary]
background = "#0f111a"
foreground = "#a9b1d6"

[colors.cursor]
cursor = "CellForeground"
text = "CellBackground"

[colors.vi_mode_cursor]
cursor = "CellForeground"
text = "CellBackground"

[colors.normal]
black = "#32344a"
red = "#ff5370"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#ad8ee6"
cyan = "#449dab"
white = "#787c99"

[colors.bright]
black = "#444b6a"
red = "#ff7a93"
green = "#b9f27c"
yellow = "#ff9e64"
blue = "#7da6ff"
magenta = "#bb9af7"
cyan = "#0db9d7"
white = "#acb0d0"

# Key bindings
[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"
