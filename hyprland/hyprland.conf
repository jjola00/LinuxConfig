# ~/.config/hypr/hyprland.conf

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################

monitor=eDP-1,1920x1080@120,0x0,1.0

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$menu = rofi


#################
### AUTOSTART ###
#################

exec-once = [workspace 1 silent] google-chrome
exec-once = [workspace 2 silent] $terminal
exec-once = dunst
exec-once = waybar

exec-once = hyprpaper --config ~/.config/hypr/hyprpaper/hyprpaper.conf
exec-once = ~/.config/hypr/scripts/random-wallpaper.sh &
exec-once = ~/.config/hypr/scripts/window-sound-listener.sh &

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,rose-pine-cursor
env = HYPRCURSOR_SIZE,24
# forcing every Qt app onto Wayland softened Electron clients, so keep these disabled unless absolutely required.
# env = QT_QPA_PLATFORM,wayland
# env = QT_STYLE_OVERRIDE,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = HYPRLAND_FONT,JetBrainsMono Nerd Font
# ensure Hyprland-launched processes see ~/.local/bin first so the Wayland wrappers run everywhere.
env = PATH,/home/kami/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin


#####################
### LOOK AND FEEL ###
#####################

# Rose Pine Moon theme

general {
    gaps_in = 6
    gaps_out = 18

    border_size = 3

    col.active_border = rgba(c4a7e7ff) rgba(9ccfd8ff) 45deg
    col.inactive_border = rgba(6e6a86aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000040)
        offset = -15 -10
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.12
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 6,    default
    animation = border,        1, 4.5,  easeOutQuint
    animation = windows,       1, 4.2,  easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.6,  linear,       popin 87%
    animation = fadeIn,        1, 1.8,  almostLinear
    animation = fadeOut,       1, 1.5,  almostLinear
    animation = fade,          1, 2.8,  quick
    animation = layers,        1, 3.2,  easeOutQuint
    animation = layersIn,      1, 3.8,  easeOutQuint, fade
    animation = layersOut,     1, 1.4,  linear,       fade
    animation = fadeLayersIn,  1, 1.7,  almostLinear
    animation = fadeLayersOut, 1, 1.4,  almostLinear
    animation = workspaces,    1, 2.0,  almostLinear, fade
    animation = workspacesIn,  1, 1.3,  almostLinear, fade
    animation = workspacesOut, 1, 2.0,  almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    allow_session_lock_restore = true
    disable_hyprland_qtutils_check = true
}

debug {
    disable_logs = false
    enable_stdout_logs = false
}


#############
### INPUT ###
#############

input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Apps (i3-style)
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, ~/.config/hypr/scripts/wallpaper-engine.sh
bind = $mainMod, A, exec, google-chrome
bind = $mainMod, W, exec, ~/.config/hypr/scripts/web-search.sh
bind = $mainMod SHIFT, W, exec, firefox --new-window https://web.whatsapp.com/
bind = $mainMod, I, exec, kiro
bind = $mainMod, S, exec, spotify
bind = $mainMod, E, exec, ~/.config/hypr/scripts/toggle-energy-saver.sh
bind = $mainMod, M, exec, thunar
bind = $mainMod, D, exec, discord

# Kill / exit
bind = $mainMod, Q, killactive,

# Fuzzel launcher + rofi helpers
bind = $mainMod, P, exec, rofi -show drun -theme ~/.config/rofi/rose-pine-moon.rasi -theme-str "window { height: 520px; width: 600px; }"
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/change-wallpaper.sh
bind = $mainMod, X, exec, rofi-powermenu
bind = $mainMod, N, exec, ~/.config/hypr/scripts/toggle-hyprshade.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Splits
bind = $mainMod, H, togglesplit,
bind = $mainMod, V, togglesplit,

# Fullscreen
bind = $mainMod, F, fullscreen, 0

# Toggle split behavior (like i3 layout toggle split)
bind = $mainMod, T, togglesplit,

# Floating
bind = $mainMod SHIFT, space, togglefloating,

# Lock / suspend
bind = $mainMod, L, exec, ~/.config/hypr/scripts/lockscreen-wallpaper.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/toggle-spotify-mute.sh

# Move workspace to next monitor
bind = $mainMod, B, moveworkspacetomonitor, +1

# Screenshots
bind = $mainMod, C, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh full

# Screen recording (toggle)
bind = $mainMod SHIFT, C, exec, ~/.config/hypr/scripts/screen-record.sh


# Debug X11 window class (may not work on Wayland clients)
bind = $mainMod SHIFT, D, exec, xprop | grep CLASS

# Brightness
bindel = , XF86MonBrightnessUp,   exec, sudo brightnessctl set +5% && notify-send "Brightness" "$(sudo brightnessctl get)"
bindel = , XF86MonBrightnessDown, exec, sudo brightnessctl set 5%- && notify-send "Brightness" "$(sudo brightnessctl get)"
bind = CTRL, F7, exec, sudo brightnessctl set 5%-
bind = CTRL, F8, exec, sudo brightnessctl set +5%

# Audio (amixer / pactl like i3)
bindel = , XF86AudioRaiseVolume, exec, amixer -D pulse sset Master 5%+ && volume
bindel = , XF86AudioLowerVolume, exec, amixer -D pulse sset Master 5%- && volume
bindel = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle && mute
# bindel = , XF86AudioMicMute,   exec, amixer -D pulse sset Master 5%+ && volume

# Screen off
bind = , XF86ScreenSaver, exec, xset dpms force off

# Extra terminals / menus
bind = CTRL, F1, exec, alacritty
bind = CTRL, F5, exec, kitty
bind = CTRL, F2, exec, dmenu_run

# Microphone toggle with dunst notifications
bind = CTRL, F3, exec, bash -c 'amixer set Capture nocap && dunstify -a "Microphone" "Microphone" "Microphone is muted" -r 100 -i /usr/local/bin/icons/mic-off.svg'
bind = CTRL, F4, exec, bash -c 'amixer set Capture cap && dunstify -a "Microphone" "Microphone" "Microphone is unmuted" -r 100 -i /usr/local/bin/icons/mic.svg'

# Touchpad toggle (X11/xinput, kept)
bind = CTRL, F9,  exec, xinput set-prop $(xinput list | grep -oP 'Touchpad.*id=\\K\\d+') "Device Enabled" 0 && dunstify -a "Touchpad" "Touchpad" "Touchpad is disabled" -r 100
bind = CTRL, F10, exec, xinput set-prop $(xinput list | grep -oP 'Touchpad.*id=\\K\\d+') "Device Enabled" 1 && dunstify -a "Touchpad" "Touchpad" "Touchpad is enabled" -r 100

# Workspaces 1–10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = noblur, class:^(kitty)$
# Keep Electron/Chromium apps sharp so they do not stack blur + opacity filters.
windowrulev2 = noblur, class:^(code-url-handler|code|Code|VSCodium|codium|jetbrains-.*|CLion|clion|PyCharm|pycharm|GoLand|goland|Rider|rider|WebStorm|webstorm|Kiro|kiro|Spotify|spotify|google-chrome|Google-chrome|chrome|Chromium|chromium|brave-browser|Brave-browser)$
windowrulev2 = opacity 1 override 1, class:^(code-url-handler|code|Code|VSCodium|codium|jetbrains-.*|CLion|clion|PyCharm|pycharm|GoLand|goland|Rider|rider|WebStorm|webstorm|Kiro|kiro|Spotify|spotify|google-chrome|Google-chrome|chrome|Chromium|chromium|brave-browser|Brave-browser)$

# Wallpaper Engine popup
windowrulev2 = float, title:^(Wallpaper Engine)$
windowrulev2 = float, title:^(Delete Wallpaper)$
windowrulev2 = float, title:^(Import Wallpapers)$

###################
### LAYER RULES ###
###################
