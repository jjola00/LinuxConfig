# ~/.config/hypr/hyprlock.conf
# Rose Pine Moon themed lockscreen configuration

# General settings
general {
    hide_cursor = false
}

# Background with minimal blur effect
background {
    monitor = 
    path = screenshot   # Will be replaced by script
    blur_passes = 1
    blur_size = 3
    noise = 0.0
    contrast = 1.0
    brightness = 0.95
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# Time display - large and centered
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)  # Clean white like the example
    font_size = 84
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
}

# Greeting message - clean and minimal
label {
    monitor =
    text = Hi Kami :)
    color = rgba(196, 167, 231, 1.0)  # Rose Pine iris - soft purple
    font_size = 28
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 20
    halign = center
    valign = center
}

# Password input field - sleek and minimal
input-field {
    monitor =
    size = 350, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.3)  # Subtle white outline
    inner_color = rgba(0, 0, 0, 0.2)        # Very transparent
    font_color = rgba(255, 255, 255, 0.9)   # Clean white text
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = Input Password...
    hide_input = false
    rounding = 25
    check_color = rgba(196, 167, 231, 0.8)  # Rose Pine iris
    fail_color = rgba(235, 111, 146, 0.8)   # Rose Pine love (red)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(246, 193, 119, 0.8)  # Rose Pine gold
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -120
    halign = center
    valign = center
}