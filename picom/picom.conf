#################################
# Picom (jonaburg) Configuration
#################################

backend = "glx";
vsync = true;
experimental-backends = true;

#################################
# Corners (global)
#################################
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
  # keep Rofi rounded; remove next line if you want it square:
  # "class_g = 'Rofi'"
];

#################################
# Shadows (global)
#################################
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.40;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "name = 'Notification'",
  "window_type = 'dock'",
  "class_g = 'Polybar'"
];

#################################
# Fading (global)
#################################
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 10;

#################################
# Animations / transitions (jonaburg)
#################################
transition-length = 250;
transition-step   = 1.0;
transition-pow-x  = 0.10;
transition-pow-y  = 0.10;
transition-pow-w  = 0.10;
transition-pow-h  = 0.10;

#################################
# Blur (global background blur behind translucent windows)
#################################
blur-method = "dual_kawase";
blur-strength = 8;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

#################################
# Opacity rules (ONLY Alacritty is semi-transparent)
#################################
# Everyone defaults to 100% unless overridden here.
opacity-rule = [
  "92:class_g = 'Alacritty'"
];